name: cron

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: write

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 'master'

      - name: setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
      - run: npm i semver

      - name: update latest.json
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { readFileSync, writeFileSync } = require('node:fs');
            const { resolve } = require("node:path");
            const semver = require("semver");
            class Latest{
              json = {};
              path = "./src/semver/latest.json";
              github = {
                openssl:{
                  repo:"openssl/openssl",
                  replace:/openssl-/ig
                },
                python:{
                  repo:"python/cpython",
                  match:(json) => {
                    for(const tag of json){
                      if(tag?.name && `${tag.name}`.match(/v[0-9]{1,3}.[0-9]{1,3}.[^A-Za-z]{1,}$/ig)){
                        return(tag.name);
                      }
                    }
                    return(false);
                  }
                },
                zlib:{
                  repo:"madler/zlib",
                  replace:/v/ig
                },
                pcre2:{
                  semver:"m.m",
                  repo:"PCRE2Project/pcre2",
                  replace:/pcre2-/ig
                },
                headers_more_nginx_module:{
                  semver:"m.m",
                  repo:"openresty/headers-more-nginx-module",
                  match:(json) => {
                    for(const tag of json){
                      if(tag?.name && `${tag.name}`.match(/v[0-9]{1,3}.[0-9]{1,3}.[^A-Za-z]{1,}$/ig)){
                        return(tag.name);
                      }
                    }
                    return(false);
                  }
                },
                libxml2:{
                  repo:"GNOME/libxml2",
                  match:(json) => {
                    for(const tag of json){
                      if(tag?.name && `${tag.name}`.match(/v[0-9]{1,3}.[0-9]{1,3}.[^A-Za-z]{1,}$/ig)){
                        return(tag.name);
                      }
                    }
                    return(false);
                  }
                },
                libxslt:{
                  repo:"GNOME/libxslt",
                  match:(json) => {
                    for(const tag of json){
                      if(tag?.name && `${tag.name}`.match(/v[0-9]{1,3}.[0-9]{1,3}.[^A-Za-z]{1,}$/ig)){
                        return(tag.name);
                      }
                    }
                    return(false);
                  }
                },
                njs:{
                  repo:"nginx/njs",
                  replace:/v/ig
                },
                php:{
                  repo:"php/php-src",
                  replace:/php-/ig
                },
              };

              constructor(){}

              async update(){
                const path = resolve(this.path);
                this.json = JSON.parse(readFileSync(path).toString());
                for(const app in this.json){
                  try{
                    let j = null;
                    switch(`${app}`.toLowerCase()){
                      case "go":
                        j = await this.#fetchJson("https://go.dev/dl/?mode=json");
                        if(j && Array.isArray(j) && j.length > 0 && j[0]?.version){
                          this.#setVersion(app, j[0].version);
                        }
                      break;

                      case "openssl":
                      case "zlib":
                      case "pcre2":
                      case "njs":
                      case "php":
                        j = await this.#fetchJson(`https://api.github.com/repos/${this.github[app].repo}/releases/latest`);
                        if(j && j?.tag_name){
                          this.#setVersion(app, `${j.tag_name}`.replace(this.github[app].replace, ""), this.github[app]?.semver);
                        }
                      break;

                      case "python":
                      case "headers_more_nginx_module":
                      case "libxml2":
                      case "libxslt":
                        for(let i=1; i<=10; i++){
                          j = await this.#fetchJson(`https://api.github.com/repos/${this.github[app].repo}/tags?page=${i}`);
                          if(j && Array.isArray(j) && j.length > 0){
                            const found = this.github[app].match(j);
                            if(found){
                              this.#setVersion(app, found, this.github[app]?.semver);
                              break;
                            }
                          }
                        }
                      break;
                    }
                  }catch(e){
                    core.warning(`error processing ${app}: ${e}`);
                  }
                }
                writeFileSync(path, JSON.stringify(this.json, null, 2));
              }

              async #fetchJson(url){
                const response = await fetch(url);
                if(!response.ok){
                  throw new Error(`error fetching url: ${response.status}`);
                }
                return(await response.json());
              }

              #setVersion(app, version, format){
                version = semver.valid(semver.coerce(version));
                if(version){
                  version = ((null !== format && format) ? format : "m.m.p")
                    .replace(/m\.m\.p/i, `${semver.major(version)}.${semver.minor(version)}.${semver.patch(version)}`)
                    .replace(/m\.m/i, `${semver.major(version)}.${semver.minor(version)}`);
                  if(this.json[app] !== version){
                    core.warning(`updated semver for ${app} from ${this.json[app]} to ${version}`);
                    this.json[app] = version;
                  }else{
                    core.info(`no updated needed for ${app}!`);
                  }
                }else{
                  throw new Error(`could not update version for ${app}: ${version}, is not a valid semver!`);
                }
              }
            }

            try{
              const latest = new Latest();
              await latest.update();
            }catch(e){
              core.setFailed(e);
            }

      - name: checkout
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./src/semver/latest.json
          git commit -m "chore: auto update versions"
          git push origin HEAD:master